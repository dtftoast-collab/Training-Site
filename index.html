<head>

  <style>
    body { margin:0; font-family:'Noto Sans', Arial, sans-serif; background:#f6f6f6; color:#222; }

    .header { background:#fff; border-bottom:4px solid #c8102e; text-align:center; padding:24px 16px 16px; }
    .logo { max-width:220px; margin-bottom:8px; }
    .title { font-size:20px; font-weight:600; color:#c8102e; letter-spacing:2px; }

    .topbar { display:flex; justify-content:center; align-items:center; gap:10px; padding:16px; background:#fff; border-bottom:1px solid #eee; }
    .select { padding:10px 12px; border-radius:8px; border:1px solid #ddd; min-width:220px; font-size:14px; }

    .container { max-width:1100px; margin:0 auto; padding:30px 20px; display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:24px; }
    .card { background:#fff; border-radius:14px; padding:20px; box-shadow:0 8px 20px rgba(0,0,0,0.06); border-top:5px solid #c8102e; }
    .card h2 { font-size:16px; margin-bottom:14px; border-bottom:1px solid #eee; padding-bottom:6px; }

    .btn { display:flex; justify-content:space-between; align-items:center; text-decoration:none; padding:12px 14px; margin:8px 0; border-radius:10px; border:1px solid #e0e0e0; color:#333; background:#fafafa; font-size:14px; transition:all .2s ease; }
    .btn:hover { background:#c8102e; color:#fff; border-color:#c8102e; transform:translateY(-2px); }
    .arrow { font-size:12px; opacity:.6; }

    .footer { text-align:center; font-size:12px; color:#888; padding:20px; }
  </style>
</head>
